name: SlimeVR Full Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Lint and Java Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: GUI Lint
        run: pnpm i && cd gui && pnpm run lint
      - name: Java Spotless Check
        run: ./gradlew spotlessCheck --build-cache

  build-server-jar:
    name: Build Server ShadowJar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build ShadowJar
        run: ./gradlew :server:desktop:shadowJar --build-cache
      - name: Upload Server Jar
        uses: actions/upload-artifact@v6
        with:
          name: server-jar
          path: server/desktop/build/libs/slimevr.jar

  build-gui-frontend:
    name: Build GUI Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Build JS
        run: pnpm i && cd gui && pnpm run build
      - name: Tar GUI Dist
        run: tar -czf slimevr-gui-dist.tar.gz -C gui/out .
      - name: Upload GUI Dist
        uses: actions/upload-artifact@v6
        with:
          name: gui-dist
          path: slimevr-gui-dist.tar.gz

  package-desktop:
    name: Package Desktop (${{ matrix.platform }} - ${{ matrix.os }})
    needs: [build-server-jar, build-gui-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: ubuntu-22.04-arm
            platform: linux
          - os: windows-latest
            platform: windows
          - os: windows-11-arm
            platform: windows
          # - os: macos-latest
          #   platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Download Server Jar
        uses: actions/download-artifact@v6
        with:
          name: server-jar
          path: server/desktop/build/libs/
      - name: Download GUI Dist
        uses: actions/download-artifact@v6
        with:
          name: gui-dist
      - name: Extract GUI for Electron
        # Using bash shell explicitly for cross-platform compatibility
        shell: bash
        run: mkdir -p gui/out && tar -xzf slimevr-gui-dist.tar.gz -C gui/out
      - name: Run Electron Builder
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          mkdir -p gui/dist/artifacts/linux/ \
                   gui/dist/artifacts/win \
                   gui/dist/artifacts/mac
          cd gui
          pnpm i
          pnpm exec electron-builder --${{ matrix.platform }} ${{ matrix.platform == 'macos' && '--universal' || '' }} --publish never
      - name: Collect and Rename Artifacts
        shell: bash
        run: |
          mkdir -p release-out

          if [ "${{ matrix.platform }}" == "windows" ]; then
            # Map Windows Arch
            if [[ "${{ matrix.os }}" == *"arm"* ]]; then
              FINAL_NAME="SlimeVR-win-aarch64.zip"
            else
              FINAL_NAME="SlimeVR-win64.zip"
            fi
            cp gui/dist/artifacts/win/*.exe release-out/$FINAL_NAME

          elif [ "${{ matrix.platform }}" == "linux" ]; then
            # Move files and rename based on arch patterns
            cd gui/dist/artifacts/linux
            for f in *; do
              NEW_NAME=$f
              # Normalize x86_64 to amd64
              NEW_NAME=${NEW_NAME//x86_64/amd64}
              # Normalize arm64 to aarch64
              NEW_NAME=${NEW_NAME//arm64/aarch64}
              cp "$f" "../../../release-out/$NEW_NAME"
            done
            cd ../../../

          elif [ "${{ matrix.platform }}" == "macos" ]; then
            cp gui/dist/artifacts/mac/*.dmg release-out/SlimeVR-mac.dmg
          fi

          echo "Final artifacts for ${{ matrix.platform }}:"
          ls -lh release-out/
      - name: Upload For Release
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.platform }}-${{ matrix.os }}
          path: release-out/*
  bundle-android:
    name: Build Android APK
    needs: [build-gui-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Download GUI Dist
        uses: actions/download-artifact@v6
        with:
          name: gui-dist
      - name: Extract GUI for Android
        run: mkdir -p gui/out && tar -xzf slimevr-gui-dist.tar.gz -C gui/out
      - name: Build APK
        run: ./gradlew :server:android:build --build-cache
        env:
          ANDROID_STORE_FILE: ${{ secrets.ANDROID_STORE_FILE }}
          ANDROID_STORE_PASSWD: ${{ secrets.ANDROID_STORE_PASSWD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWD: ${{ secrets.ANDROID_KEY_PASSWD }}
      - name: Prepare APK
        run: cp server/android/build/outputs/apk/release/*.apk ./SlimeVR-android.apk
      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: release-android
          path: SlimeVR-android.apk

  create-release:
    name: Finalize Release Draft
    needs: [package-desktop, bundle-android, build-server-jar, build-gui-frontend]
    # if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download All Release Artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-*
          merge-multiple: true
      - name: Download Server Jar
        uses: actions/download-artifact@v6
        with:
          name: server-jar
      - name: Download GUI Dist
        uses: actions/download-artifact@v6
        with:
          name: gui-dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: electron-test
          generate_release_notes: true
          files: |
            *.AppImage
            *.deb
            *.rpm
            *.apk
            *.dmg
            *.zip
            *.jar
            *.tar.gz
