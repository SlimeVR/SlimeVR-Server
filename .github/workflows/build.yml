name: SlimeVR Full Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: Lint and Java Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: GUI Lint
        run: pnpm i && cd gui && pnpm run lint
      - name: Java Spotless Check
        run: ./gradlew spotlessCheck --build-cache

  build-server-jar:
    name: Build Server ShadowJar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build ShadowJar
        run: ./gradlew :server:desktop:shadowJar --build-cache
      - name: Upload Server Jar
        uses: actions/upload-artifact@v6
        with:
          name: server-jar
          path: server/desktop/build/libs/slimevr.jar

  build-gui-frontend:
    name: Build GUI Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Build JS
        run: pnpm i && cd gui && pnpm run build
      - name: Upload GUI Assets
        uses: actions/upload-artifact@v6
        with:
          name: gui-assets
          path: gui/out/

  package-desktop:
    name: Package Desktop (${{ matrix.platform }} - ${{ matrix.os }})
    needs: [checks, build-server-jar, build-gui-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: ubuntu-22.04-arm
            platform: linux
          - os: windows-latest
            platform: windows
          - os: windows-11-arm
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    env:
      BUILD_ARCH: ${{ endsWith(matrix.os, 'arm') && 'aarch64' || 'amd64' }}
      FINAL_ZIP: SlimeVR-${{ matrix.platform }}-${{ endsWith(matrix.os, 'arm') && 'aarch64' || 'amd64' }}.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Download Server Jar
        uses: actions/download-artifact@v6
        with:
          name: server-jar
          path: server/desktop/build/libs/
      - name: Download GUI Assets
        uses: actions/download-artifact@v6
        with:
          name: gui-assets
          path: gui/out/
      - name: Install Dependencies
        run: pnpm i
      - name: Prepare Linux Directories
        if: matrix.platform == 'linux'
        run: mkdir -p gui/dist/artifacts/linux/{AppImage,deb,rpm}
      - name: Run Electron Builder
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NODE_OPTIONS: ${{ matrix.os == 'macos-latest' && '--max-old-space-size=4096' || '' }}
        run: |
          cd gui
          pnpm exec electron-builder --${{ matrix.platform }} ${{ matrix.platform == 'macos' && '--universal' || '' }} --publish never
      - name: Bundle and Zip
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ matrix.platform }}" == "windows" ]; then
            cp gui/dist/artifacts/win/*.exe staging/slimevr.exe
            cp gui/electron/resources/icons/icon.ico staging/run.ico
          elif [ "${{ matrix.platform }}" == "linux" ]; then
            cp gui/dist/artifacts/linux/AppImage/*.AppImage staging/
            cp gui/dist/artifacts/linux/deb/*.deb staging/
            cp gui/dist/artifacts/linux/rpm/*.rpm staging/
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            cp gui/dist/artifacts/mac/*.dmg staging/
          fi
          cp server/desktop/build/libs/slimevr.jar staging/
          if [ -d "server/core/resources" ]; then
            cp -r server/core/resources/* staging/ || true
          fi
          7z a -tzip "${{ env.FINAL_ZIP }}" ./staging/*
      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v6
        with:
          name: SlimeVR-${{ matrix.platform }}-${{ env.BUILD_ARCH }}
          path: ${{ env.FINAL_ZIP }}

  bundle-android:
    name: Build Android APK
    needs: [build-gui-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Fetch Tags
        run: git fetch --tags origin --recurse-submodules=no --force
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Download GUI Assets
        uses: actions/download-artifact@v6
        with:
          name: gui-assets
          path: gui/out/
      - name: Build APK
        run: ./gradlew :server:android:build --build-cache
        env:
          ANDROID_STORE_FILE: ${{ secrets.ANDROID_STORE_FILE }}
          ANDROID_STORE_PASSWD: ${{ secrets.ANDROID_STORE_PASSWD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWD: ${{ secrets.ANDROID_KEY_PASSWD }}
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: 'SlimeVR-Android'
          path: server/android/build/outputs/apk/release/*.apk
      - name: Prepare Release APK
        # if: startsWith(github.ref, 'refs/tags/')
        run: cp server/android/build/outputs/apk/release/*.apk ./SlimeVR-android.apk
      - name: Upload Android Release
        uses: softprops/action-gh-release@v2
        # if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          tag_name: electron-test
          generate_release_notes: true
          files: ./SlimeVR-android.apk

  create-release:
    name: Release Draft
    needs: [package-desktop]
    # if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download All Desktop Zips
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: electron-test
          generate_release_notes: true
          files: release-assets/*.zip
